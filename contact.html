  <div class="page-header">
    <span class="page-eyebrow">Contact</span>
    <h1 class="page-title">CONTACT</h1>
    <p class="page-intro">
      <span class="placeholder-note">For performance, dramaturgy, research, teaching, and collaboration
        inquiries.</span>
    </p>
  </div>

  <main class="page-body">
    <section class="section contact-section" style="border-top:none; margin-top:0;">
      <form class="contact-form" name="contact" method="POST" data-netlify="true" netlify
        data-netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact">
        <p class="netlify-honeypot">
          <label>Do not fill this out if you are human: <input name="bot-field"></label>
        </p>

        <div class="form-grid">
          <label class="form-field">
            <span>Name</span>
            <input type="text" name="name" autocomplete="name" required>
          </label>

          <label class="form-field">
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
        </div>

        <label class="form-field">
          <span>Subject</span>
          <input type="text" name="subject" autocomplete="off">
        </label>

        <label class="form-field">
          <span>Message</span>
          <textarea name="message" rows="8" required></textarea>
        </label>

        <button class="btn btn-zap contact-submit" type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <span>© Amani Starnes</span>
